<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acadêmico | Cursos Online</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../index.html">
                <i class="bi bi-play-circle-fill me-2 text-primary"></i>Cursos Online
            </a>
            <div class="navbar-nav ms-auto flex-row gap-3">
                <a class="nav-link active" href="academico.html">Acadêmico</a>
                <a class="nav-link text-white-50" href="usuario.html">Usuários</a>
                <a class="nav-link text-white-50" href="financeiro.html">Financeiro</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold m-0">Gestão Acadêmica</h2>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#modalCat">Nova Categoria</button>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCurso">Novo Curso</button>
            </div>
        </div>

        <div class="main-card p-3 mb-4">
            <label class="small fw-bold text-muted mb-1">LISTAR POR CATEGORIA</label>
            <select id="filtroCategoria" class="form-select"></select>
        </div>

        <div class="main-card overflow-hidden">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-3">ID</th>
                        <th>Curso / Nível</th>
                        <th>Categoria (FK)</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoCursos"></tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="modalCat" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <form id="formCategoria">
                    <div class="modal-header border-0"><h5>Nova Categoria</h5></div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="small fw-bold">NOME (UNIQUE)</label>
                            <input type="text" id="cat-nome" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold">DESCRIÇÃO</label>
                            <textarea id="cat-desc" class="form-control"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer border-0">
                        <button type="submit" class="btn btn-primary w-100">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalCurso" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <form id="formCurso">
                    <div class="modal-header border-0"><h5>Registar Novo Curso</h5></div>
                    <div class="modal-body row g-3">
                        <div class="col-12"><label class="small fw-bold">TÍTULO</label><input type="text" id="c-titulo" class="form-control" required></div>
                        <div class="col-12">
                            <label class="small fw-bold">CATEGORIA</label>
                            <select id="selectCategorias" class="form-select" required></select>
                        </div>
                        <div class="col-md-6"><label class="small fw-bold">ID INSTRUTOR</label><input type="number" id="c-instrutor" class="form-control" value="1"></div>
                        <div class="col-md-6">
                            <label class="small fw-bold">NÍVEL</label>
                            <select id="c-nivel" class="form-select">
                                <option>Iniciante</option>
                                <option>Intermediário</option>
                                <option>Avançado</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer border-0">
                        <button type="submit" class="btn btn-primary w-100">Criar Curso</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="../modules/categoria/categoria.js"></script>
    <script src="../modules/curso/curso.js"></script>
    <script src="../modules/categoria/categoriaController.js"></script>
    <script src="../modules/curso/cursoController.js"></script>

    <script>
        window.onload = function() {
            try {
                const catCtrl = new CategoriaController();
                const cursoCtrl = new CursoController();

                function sync() {
                    const categorias = catCtrl.listarTodas();
                    const filtro = document.getElementById('filtroCategoria');
                    const selectModal = document.getElementById('selectCategorias');

                    const html = categorias.map(c => `<option value="${c.ID_Categoria}">${c.Nome}</option>`).join('');
                    
                    filtro.innerHTML = '<option value="todos">Todas</option>' + html;
                    selectModal.innerHTML = html || '<option disabled>Sem categorias</option>';
                    
                    render();
                }

                function render() {
                    const corpo = document.getElementById('corpoCursos');
                    const filtroVal = document.getElementById('filtroCategoria').value;
                    const dados = (filtroVal === "todos") ? cursoCtrl.listarTodos() : cursoCtrl.listarPorCategoria(filtroVal);

                    corpo.innerHTML = dados.map(c => `
                        <tr>
                            <td class="ps-3">#${c.ID_Curso}</td>
                            <td><b>${c.Titulo}</b><br><small class="text-primary">${c.Nivel}</small></td>
                            <td>ID: ${c.ID_Categoria}</td>
                            <td class="text-center">
                                <button class="btn btn-sm btn-outline-danger border-0" onclick="apagar(${c.ID_Curso})">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `).join('');
                }

                document.getElementById('formCategoria').onsubmit = function(e) {
                    e.preventDefault();
                    catCtrl.cadastrar(document.getElementById('cat-nome').value, document.getElementById('cat-desc').value);
                    bootstrap.Modal.getInstance(document.getElementById('modalCat')).hide();
                    this.reset();
                    sync();
                };

                document.getElementById('formCurso').onsubmit = function(e) {
                    e.preventDefault();
                    cursoCtrl.cadastrar(
                        document.getElementById('c-titulo').value, "",
                        document.getElementById('c-instrutor').value,
                        document.getElementById('selectCategorias').value,
                        document.getElementById('c-nivel').value, 1, 1
                    );
                    bootstrap.Modal.getInstance(document.getElementById('modalCurso')).hide();
                    this.reset();
                    render();
                };

                document.getElementById('filtroCategoria').onchange = () => render();

                window.apagar = (id) => {
                    if(confirm("Deseja remover este curso? Esta ação não pode ser desfeita.")) { 
                        // 1. Puxa a lista atual de cursos
                        let listaCursos = cursoCtrl.listarTodos();
                        
                        // 2. Filtra a lista, removendo o curso com o ID selecionado
                        listaCursos = listaCursos.filter(c => c.ID_Curso != id);
                        
                        // 3. Salva a nova lista de volta no banco de dados do navegador (LocalStorage)
                        localStorage.setItem(cursoCtrl.key || 'cursos', JSON.stringify(listaCursos));
                        
                        // 4. Recarrega a tabela na tela
                        render(); 
                    }
                };

                sync();

            } catch (err) {
                console.error("Erro ao carregar controladores:", err);
            }
        };
    </script>
</body>
</html>
