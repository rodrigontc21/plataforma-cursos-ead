<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Trilhas | Cursos Online</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4" id="navbar">
    <div class="container">
        <a class="navbar-brand fw-bold" href="../index.html">
            <i class="bi bi-diagram-3-fill me-2"></i>Cursos<span>Online</span>
        </a>
        <div class="navbar-nav ms-auto flex-row gap-2">
            <a class="nav-link" href="academico.html">Acadêmico</a>
            <a class="nav-link" href="conteudo.html">Conteúdo</a>
            <a class="nav-link ativo" href="trilha.html">Trilhas</a>
            <a class="nav-link" href="usuario.html">Usuários</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row mb-4 align-items-center">
        <div class="col-md-6">
            <h2 class="fw-bold mb-1">Gestão de Trilhas</h2>
            <p class="text-muted">Agrupe seus cursos em formações completas para os alunos.</p>
        </div>
        <div class="col-md-6 text-md-end">
            <button class="btn btn-primary fw-bold px-4 py-2" data-bs-toggle="modal" data-bs-target="#modalTrilha">
                <i class="bi bi-plus-lg me-2"></i>NOVA TRILHA
            </button>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="table-card p-0">
                <div class="p-3 border-bottom bg-light">
                    <h6 class="m-0 fw-bold text-dark"><i class="bi bi-list-ul me-2"></i>Trilhas Cadastradas</h6>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">ID</th>
                                <th>Título da Formação</th>
                                <th>Descrição</th>
                                <th class="text-center pe-4">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-trilhas">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalTrilha" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-dark text-white border-0">
                <h5 class="modal-title fw-bold"><i class="bi bi-plus-circle me-2 text-warning"></i>Cadastrar Trilha</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">TÍTULO DA FORMAÇÃO</label>
                    <input type="text" id="t-titulo" class="form-control form-control-lg" placeholder="Ex: Especialista Java Full-Stack">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">DESCRIÇÃO CURTA</label>
                    <textarea id="t-descricao" class="form-control" rows="3" placeholder="O que o aluno aprenderá nesta jornada?"></textarea>
                </div>
            </div>
            <div class="modal-footer border-0 p-4 pt-0">
                <button class="btn btn-primary w-100 fw-bold py-3" onclick="salvarTrilha()">
                    CRIAR TRILHA AGORA
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../modules/trilha/trilhaController.js"></script>

<script>
    const trilhaCtrl = new TrilhaController();

    window.onload = () => renderizar();

    function renderizar() {
        const trilhas = trilhaCtrl.listarTodas();
        const tbody = document.getElementById('tabela-trilhas');
        
        if (!trilhas || trilhas.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center py-5 text-muted">Nenhuma trilha encontrada. Comece criando uma nova!</td></tr>';
            return;
        }

        tbody.innerHTML = trilhas.map(t => `
            <tr>
                <td class="ps-4"><span class="badge bg-light text-muted border">#${t.ID_Trilha}</span></td>
                <td>
                    <div class="fw-bold text-primary">${t.Titulo}</div>
                </td>
                <td>
                    <div class="text-muted small text-truncate" style="max-width: 300px;">
                        ${t.Descricao || '<span class="fst-italic">Sem descrição</span>'}
                    </div>
                </td>
                <td class="text-center pe-4">
                    <button class="btn btn-sm btn-outline-danger border-0" title="Excluir" onclick="remover('${t.ID_Trilha}')">
                        <i class="bi bi-trash3-fill"></i>
                    </button>
                </td>
            </tr>
        `).join('');
    }

    function salvarTrilha() {
        const tit = document.getElementById('t-titulo').value;
        const desc = document.getElementById('t-descricao').value;

        if (!tit) {
            alert("O título é obrigatório!");
            return;
        }

        if (trilhaCtrl.cadastrar(tit, desc)) {
            const modal = bootstrap.Modal.getInstance(document.getElementById('modalTrilha'));
            modal.hide();
            
            // Limpa campos
            document.getElementById('t-titulo').value = '';
            document.getElementById('t-descricao').value = '';
            
            renderizar();
        }
    }

    function remover(id) {
        if (confirm("Deseja realmente excluir esta trilha? Esta ação não pode ser desfeita.")) {
            const trilhasAtuais = trilhaCtrl.listarTodas();
            const novaLista = trilhasAtuais.filter(t => t.ID_Trilha != id);
            localStorage.setItem('trilhas', JSON.stringify(novaLista));
            renderizar();
        }
    }
</script>
</body>
</html>
