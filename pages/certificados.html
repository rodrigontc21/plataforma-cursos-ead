<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificados Emitidos | Cursos Online</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="../index.html">
            <i class="bi bi-patch-check-fill me-2 text-success"></i>Cursos Online
        </a>
        <div class="navbar-nav ms-auto flex-row gap-3">
            <a class="nav-link text-white-50" href="academico.html">Acadêmico</a>
            <a class="nav-link text-white-50" href="conteudo.html">Conteúdo</a>
            <a class="nav-link text-white-50" href="trilha.html">Trilhas</a>
            <a class="nav-link active" href="certificados.html">Certificados</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row mb-4">
        <div class="col-12">
            <h2 class="fw-bold">Certificados Gerados</h2>
            <p class="text-muted">Lista de todos os alunos que concluíram cursos ou trilhas.</p>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card card-cert p-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Código</th>
                                <th>Aluno</th>
                                <th>Curso / Trilha</th>
                                <th>Data de Emissão</th>
                                <th class="text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-certificados">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="../modules/certificado/certificadoController.js"></script>
<script src="../modules/usuario/usuarioController.js"></script>
<script src="../modules/curso/cursoController.js"></script>
<script src="../modules/trilha/trilhaController.js"></script>

<script>
    const certCtrl = new CertificadoController();
    const userCtrl = new UsuarioController();
    const cursoCtrl = new CursoController();
    const trilhaCtrl = new TrilhaController();

    window.onload = () => renderizar();

    function renderizar() {
        const certificados = certCtrl.listarTodos();
        const usuarios = userCtrl.listarTodos();
        const cursos = cursoCtrl.listarTodos();
        const trilhas = trilhaCtrl.listarTodas();
        const tbody = document.getElementById('tabela-certificados');

        if (certificados.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4">Nenhum certificado emitido até ao momento.</td></tr>';
            return;
        }

        tbody.innerHTML = certificados.map(c => {
            const aluno = usuarios.find(u => u.ID_Usuario == c.ID_Usuario);
            
            let nomeReferencia = "---";
            if (c.ID_Curso) {
                const curso = cursos.find(cur => cur.ID_Curso == c.ID_Curso);
                nomeReferencia = `<span class="badge bg-info text-dark">Curso:</span> ${curso ? curso.Titulo : 'Não encontrado'}`;
            } else if (c.ID_Trilha) {
                const trilha = trilhas.find(t => t.ID_Trilha == c.ID_Trilha);
                nomeReferencia = `<span class="badge bg-primary">Trilha:</span> ${trilha ? trilha.Titulo : 'Não encontrada'}`;
            }

            return `
                <tr>
                    <td><span class="code-box text-primary">${c.CodigoVerificacao}</span></td>
                    <td class="fw-bold">${aluno ? aluno.NomeCompleto : 'Usuário Removido'}</td>
                    <td>${nomeReferencia}</td>
                    <td>${c.DataEmissao}</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-success" onclick="verCertificado('${c.CodigoVerificacao}')">
                            <i class="bi bi-eye"></i> Visualizar
                        </button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function verCertificado(codigo) {
        alert("A abrir visualização do certificado: " + codigo);
    }
</script>

</body>
</html>
